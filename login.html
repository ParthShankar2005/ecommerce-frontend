<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoCart</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="index.html#home" aria-label="EcoCart home">
                <span class="brand-mark" aria-hidden="true">EC</span>
                <span class="brand-text">EcoCart</span>
            </a>

            <nav class="nav-menu" id="primary-nav" aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#products">Products</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                    <li><a href="login.html" aria-current="page">Login</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <form class="search-form" role="search" id="auth-search-form">
                    <label class="sr-only" for="product-search">Search products</label>
                    <input
                        id="product-search"
                        type="search"
                        placeholder="Search products..."
                        aria-label="Search products"
                    >
                </form>

                <a class="cart-button" href="cart.html" aria-label="Shopping cart with 0 items">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 4h-2l-1 2v1h2l2.6 8.1c.1.5.6.9 1.1.9h8.8v-2h-8.1l-.4-1.2h8.7c.5 0 1-.3 1.1-.8l1.6-5.5h-11.8l-.4-1.5zm3.4 14.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm7 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
                    </svg>
                    <span class="cart-count">0</span>
                </a>

                <button
                    class="menu-toggle"
                    id="menu-toggle"
                    type="button"
                    aria-label="Toggle navigation menu"
                    aria-controls="primary-nav"
                    aria-expanded="false"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-shell" aria-labelledby="login-title">
            <article class="auth-card">
                <h1 class="auth-title" id="login-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to manage your orders, cart, and saved products.</p>

                <form class="auth-form" id="login-form" novalidate>
                    <div class="form-row">
                        <label class="field-label" for="login-email">Email</label>
                        <input class="auth-input" id="login-email" name="email" type="email" autocomplete="email" required>
                        <p class="field-error" id="login-email-error"></p>
                    </div>

                    <div class="form-row">
                        <label class="field-label" for="login-password">Password</label>
                        <div class="input-wrap">
                            <input
                                class="auth-input"
                                id="login-password"
                                name="password"
                                type="password"
                                autocomplete="current-password"
                                minlength="8"
                                required
                            >
                            <button
                                class="password-toggle"
                                type="button"
                                data-target="login-password"
                                aria-label="Show password"
                            >
                                Show
                            </button>
                        </div>
                        <p class="field-error" id="login-password-error"></p>
                    </div>

                    <div class="auth-row">
                        <a class="forgot-link" id="forgot-password-link" href="#">Forgot Password?</a>
                    </div>

                    <button class="primary-btn auth-submit" type="submit">Login</button>

                    <p class="auth-feedback" id="auth-feedback" role="status" aria-live="polite"></p>
                    <p class="auth-alt">New here? <a class="auth-link" href="signup.html">Create an account</a></p>
                </form>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 EcoCart. All rights reserved.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/firebase-auth.js"></script>
    <script src="scripts/store.js"></script>
    <script src="scripts/auth-ui.js"></script>
    <script src="scripts/auth.js"></script>
</body>
</html>

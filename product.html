<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | EcoCart</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="index.html#home" aria-label="EcoCart home">
                <span class="brand-mark" aria-hidden="true">EC</span>
                <span class="brand-text">EcoCart</span>
            </a>

            <nav class="nav-menu" id="primary-nav" aria-label="Primary navigation">
                <ul>
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#products">Products</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <form class="search-form" role="search" id="product-search-form">
                    <label class="sr-only" for="product-search">Search products</label>
                    <input
                        id="product-search"
                        type="search"
                        placeholder="Search products..."
                        aria-label="Search products"
                    >
                </form>

                <button class="cart-button" type="button" aria-label="Shopping cart with 0 items">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 4h-2l-1 2v1h2l2.6 8.1c.1.5.6.9 1.1.9h8.8v-2h-8.1l-.4-1.2h8.7c.5 0 1-.3 1.1-.8l1.6-5.5h-11.8l-.4-1.5zm3.4 14.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm7 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z"/>
                    </svg>
                    <span class="cart-count">0</span>
                </button>

                <button
                    class="menu-toggle"
                    id="menu-toggle"
                    type="button"
                    aria-label="Toggle navigation menu"
                    aria-controls="primary-nav"
                    aria-expanded="false"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="detail-page">
        <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="index.html#products">Products</a>
            <span>/</span>
            <span id="detail-breadcrumb-name">Details</span>
        </nav>

        <p class="detail-status" id="detail-status" role="status">Loading product details...</p>

        <section class="product-detail-card" id="product-detail-card" aria-live="polite">
            <div class="detail-media">
                <div class="detail-image-stage" id="detail-image-stage">
                    <img
                        id="detail-main-image"
                        src="https://picsum.photos/seed/ecocart-loading/900/900"
                        alt="Selected product"
                        width="900"
                        height="900"
                    >
                    <span class="zoom-hint">Tap image to zoom</span>
                </div>

                <div class="detail-thumbs" id="detail-thumbs"></div>
            </div>

            <div class="detail-info">
                <p class="detail-category" id="detail-category">Category</p>
                <h1 id="detail-name">Loading...</h1>
                <p class="detail-price" id="detail-price">$0.00</p>
                <p class="detail-total" id="detail-total">Total: $0.00</p>
                <p class="detail-price-hint" id="detail-price-hint"></p>
                <p class="detail-description" id="detail-description">
                    Product information is loading. Please wait a moment.
                </p>

                <div class="detail-options">
                    <section class="variation-group" aria-label="Select size">
                        <h2>Size</h2>
                        <div class="variation-grid" id="detail-size-options"></div>
                    </section>

                    <section class="variation-group" aria-label="Select color">
                        <h2>Color</h2>
                        <div class="variation-grid" id="detail-color-options"></div>
                    </section>

                    <section class="variation-group" aria-label="Select material">
                        <h2>Material</h2>
                        <div class="variation-grid" id="detail-material-options"></div>
                    </section>
                </div>

                <div class="detail-actions">
                    <label class="option-group qty-group" for="detail-quantity">
                        Quantity
                        <div class="qty-selector" id="qty-selector">
                            <button class="qty-button" id="qty-decrease" type="button" aria-label="Decrease quantity">-</button>
                            <input
                                id="detail-quantity"
                                name="quantity"
                                type="number"
                                min="1"
                                max="10"
                                value="1"
                                inputmode="numeric"
                                readonly
                            >
                            <button class="qty-button" id="qty-increase" type="button" aria-label="Increase quantity">+</button>
                        </div>
                    </label>

                    <div class="detail-cta-wrap">
                        <button class="detail-add" id="detail-add-cart" type="button">Add to Cart</button>
                        <p class="detail-feedback" id="detail-feedback" role="status" aria-live="polite"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 EcoCart. All rights reserved.</p>
    </footer>

    <script src="scripts/store.js"></script>
    <script src="scripts/product.js"></script>
</body>
</html>
